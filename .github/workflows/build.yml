name: build

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_MAKE_VERSION: "0.37.18"
  FDEV_VERSION: "0.6.0"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU tar
        run: |
          if ! tar --version | grep -qi 'gnu tar'; then
            sudo apt-get update && sudo apt-get install -y tar
          fi
      - name: Cache cargo-make
        id: cargo-make-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-make
          key: cargo-make-${{ env.CARGO_MAKE_VERSION }}
      - name: Install cargo-make
        if: steps.cargo-make-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-make --version ${{ env.CARGO_MAKE_VERSION }} --locked
      - name: Cache fdev
        id: fdev-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/fdev
          key: fdev-${{ env.FDEV_VERSION }}
      - name: Install fdev
        if: steps.fdev-cache.outputs.cache-hit != 'true'
        run: cargo install fdev --version ${{ env.FDEV_VERSION }} --locked
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: fmt check
        run: cargo make fmt-check
      - name: build
        run: cargo make build
      - name: clippy
        run: cargo make clippy
      - name: test
        run: cargo make test

  ui-playwright-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
      - name: Install cargo-make
        run: cargo install cargo-make --locked
      - name: Install fdev
        run: cargo install fdev --version ${{ env.FDEV_VERSION }} --locked
      - name: Build offline UI
        run: cargo make build-ui-offline
      - name: Install Playwright deps
        run: |
          cd web/tests
          npm install
          npx playwright install --with-deps
      - name: Run Playwright
        run: cargo make test-ui-playwright
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/tests/playwright-report
          retention-days: 14
